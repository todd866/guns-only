name: Verify

# The full gate runs LOCALLY before every ship (bin/check is the deploy precondition), so
# running it again on every push of an already-gated commit burned ~90% of the monthly Actions
# quota. CI now covers pull requests and manual dispatch only.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run repository checks
        run: ./bin/check
