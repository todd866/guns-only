<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030913">
  <title>Guns Only — Air Combat Lab</title>
  <base href="/">
  <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #030913;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: linear-gradient(#071b38 0%, #183f5d 52%, #03121d 53%, #01070c 100%);
    }

    body {
      user-select: none;
      -webkit-user-select: none;
    }

    #scene,
    #hud {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
    }

    #scene {
      cursor: grab;
      outline: none;
      touch-action: none;
      background: #020611;
    }

    #scene.dragging { cursor: grabbing; }

    #hud {
      z-index: 2;
      pointer-events: none;
      image-rendering: auto;
    }

    #boot {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #d8e8eb;
      background:
        radial-gradient(circle at 50% 46%, rgba(64, 169, 199, .17), transparent 24%),
        linear-gradient(180deg, #061a35 0%, #123c5b 47%, #0b283b 49%, #02090f 64%, #010509 100%);
      transition: opacity .55s ease, visibility .55s ease;
    }

    #boot::before {
      content: "";
      position: absolute;
      width: 44vmin;
      aspect-ratio: 1;
      border: 1px solid rgba(77, 255, 136, .09);
      border-radius: 50%;
      box-shadow:
        0 0 0 8vmin rgba(77, 255, 136, .014),
        0 0 0 16vmin rgba(77, 255, 136, .008);
      animation: boot-breathe 3.2s ease-in-out infinite;
    }

    #boot::after {
      content: "";
      position: absolute;
      top: 49%;
      left: 0;
      width: 100%;
      height: 1px;
      opacity: .32;
      background: linear-gradient(90deg, transparent 8%, rgba(151, 225, 242, .3) 42%, rgba(255, 208, 121, .72) 50%, rgba(151, 225, 242, .3) 58%, transparent 92%);
    }

    #boot.ready {
      opacity: 0;
      visibility: hidden;
    }

    .boot-card {
      position: relative;
      width: min(420px, calc(100vw - 48px));
      padding: 30px 38px 28px;
      border-inline: 1px solid rgba(77, 255, 136, .15);
      background: linear-gradient(90deg, transparent, rgba(1, 8, 14, .62) 13%, rgba(1, 8, 14, .62) 87%, transparent);
      filter: drop-shadow(0 18px 35px rgba(0, 0, 0, .38));
    }

    .boot-card::before,
    .boot-card::after {
      content: "";
      position: absolute;
      left: -7px;
      width: 14px;
      height: 1px;
      background: rgba(77, 255, 136, .65);
    }

    .boot-card::before { top: 0; }
    .boot-card::after { bottom: 0; }

    .boot-kicker {
      margin-bottom: 9px;
      color: #4dff88;
      font: 600 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .boot-title {
      margin: 0;
      color: #f1f7f8;
      font-size: clamp(27px, 6vw, 38px);
      font-weight: 620;
      letter-spacing: .065em;
      text-shadow: 0 0 22px rgba(138, 223, 242, .22);
    }

    .boot-subtitle {
      margin: 7px 0 28px;
      color: rgba(203, 226, 232, .58);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .boot-track {
      position: relative;
      height: 2px;
      overflow: hidden;
      background: rgba(151, 218, 232, .12);
    }

    .boot-track::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 38%;
      background: linear-gradient(90deg, transparent, #4dff88 45%, #a2ffd0, transparent);
      filter: drop-shadow(0 0 6px rgba(77, 255, 136, .65));
      animation: boot-scan 1.15s ease-in-out infinite;
    }

    #boot-status {
      min-height: 16px;
      margin-top: 14px;
      color: rgba(201, 230, 235, .68);
      font: 500 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .08em;
    }

    #fatal {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: none;
      place-items: center;
      padding: 32px;
      background: rgba(3, 8, 14, .94);
    }

    #fatal.visible { display: grid; }

    .fatal-card {
      width: min(620px, 100%);
      padding: 28px;
      border-left: 3px solid #ffb020;
      background: #0a1420;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
    }

    .fatal-card h2 {
      margin: 0 0 10px;
      color: #ffb020;
      font-size: 18px;
      letter-spacing: .08em;
    }

    #fatal-message {
      margin: 0 0 20px;
      color: #b9c9ce;
      font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    .reload {
      color: #4dff88;
      font-size: 12px;
      letter-spacing: .08em;
      text-decoration: none;
      text-transform: uppercase;
    }

    @keyframes boot-scan {
      from { transform: translateX(-110%); }
      to { transform: translateX(270%); }
    }

    @keyframes boot-breathe {
      0%, 100% { opacity: .55; transform: scale(.98); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot::before, .boot-track::after { animation-duration: 4s; }
    }
  </style>
</head>
<body>
  <canvas id="scene" tabindex="0" aria-label="First-person air combat view"></canvas>
  <canvas id="hud" aria-hidden="true"></canvas>

  <div id="boot" role="status" aria-live="polite">
    <div class="boot-card">
      <div class="boot-kicker">Air Combat Lab</div>
      <h1 class="boot-title">GUNS ONLY</h1>
      <p class="boot-subtitle">Loading deterministic flight kernel</p>
      <div class="boot-track"></div>
      <div id="boot-status">INITIALISING WEBASSEMBLY…</div>
    </div>
  </div>

  <div id="fatal" role="alert">
    <div class="fatal-card">
      <h2>FLIGHT KERNEL OFFLINE</h2>
      <pre id="fatal-message"></pre>
      <a class="reload" href=".">Reload simulation</a>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
  <script src="./_framework/blazor.webassembly.js" autostart="false"></script>
</body>
</html>
